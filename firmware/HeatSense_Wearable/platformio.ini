[env:featheresp32]
platform = espressif32
board = featheresp32
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
board_build.partitions = huge_app.csv
build_flags = 
    -D ESP32
    -std=gnu++17
    -I"C:\Users\darks\.platformio\packages\framework-arduinoespressif32\libraries\WiFi\src"
    -I"C:\Users\darks\.platformio\packages\framework-arduinoespressif32\libraries\SPI\src"
    -I"C:\Users\darks\.platformio\packages\framework-arduinoespressif32\libraries\FFat\src"
    -I"C:\Users\darks\.platformio\packages\framework-arduinoespressif32\libraries\FS\src"
    -I"C:\Users\darks\.platformio\packages\framework-arduinoespressif32\libraries\SD\src"
    -I"C:\Users\darks\.platformio\packages\framework-arduinoespressif32\libraries\wire\src"
lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0
    emotibit/EmotiBit FeatherWing @ 1.14.4
    emotibit/EmotiBit Si7013 @ ^0.0.7
    emotibit/EmotiBit BMI160 @ ^0.3.3
    bblanchon/ArduinoJson @ ^6.21.3
    xreef/SimpleFTPServer @ ^3.0.1
    adafruit/Adafruit SH110X @ ^2.1.10
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit PN532 @ ^1.3.3
    adafruit/Adafruit DRV2605 Library @ ^1.2.4